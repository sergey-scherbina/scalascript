name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules

  validate:
    name: Validate ScalaScript
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: temurin:21

      - name: Validate front-matter
        run: scala-cli --server=false ./tools/scripts/validate-frontmatter.scala

      - name: Check example files exist
        run: |
          test -f examples/hello.ssc
          test -f examples/typed-data.ssc
          test -f examples/imports.ssc
          echo "All example files present"

  conformance:
    name: Conformance Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: temurin:21

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier/sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Build ssc launcher (sbt-assembly)
        run: bash install.sh --dev

      - name: Run conformance tests
        run: scala-cli tests/conformance/run.sc

      - name: Run examples on all three backends
        run: scala-cli examples/run-all.sc

      - name: Type-check examples (ssc check)
        run: |
          ./bin/ssc check examples/*.ssc

  sbt:
    name: sbt — compile and test
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # node enables the interp==JS(node) leg of CrossBackendPropertyTest (the
      # cross-backend differential) under `sbt test`. Without it the test skips
      # via `assume(has("node"))`. The interp==JVM(scala-cli) leg stays gated and
      # is covered by the Conformance job; subprocess hangs are bounded by
      # ProcTestUtil.runCaptured, so a wedged child fails fast, not the whole job.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier/sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Compile and assemble ssc.jar
        run: sbt compile cli/assembly

      - name: Test via sbt
        timeout-minutes: 60
        run: sbt test
