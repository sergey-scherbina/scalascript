name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules

  validate:
    name: Validate ScalaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Validate front-matter
        run: ./scripts/validate-frontmatter.scala

      - name: Check example files exist
        run: |
          test -f examples/hello.ssc
          test -f examples/typed-data.ssc
          test -f examples/imports.ssc
          echo "All example files present"

  conformance:
    name: Conformance Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Build ssc launcher (sbt-assembly)
        run: bash scripts/install.sh ./bin/ssc

      - name: Run conformance tests
        run: scala-cli conformance/run.sc

      - name: Run examples on all three backends
        run: scala-cli examples/run-all.sc

      - name: Type-check examples (ssc check)
        run: |
          ./bin/ssc check \
            examples/actors-pingpong.ssc \
            examples/content.ssc \
            examples/generators.ssc \
            examples/health-defaults.ssc \
            examples/hello.ssc \
            examples/index.ssc \
            examples/js-glue-component.ssc \
            examples/spark-streaming-file-parquet.ssc \
            examples/spark-streaming-kafka.ssc \
            examples/spark-streaming-rate-console.ssc \
            examples/sql-sqlite-file.ssc \
            examples/wasm-collections.ssc \
            examples/wasm-matrix.ssc \
            examples/wasm-primes.ssc \
            examples/wc-card.ssc

  sbt:
    name: sbt — compile and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Compile and assemble ssc.jar
        run: sbt compile cli/assembly

      - name: Test via sbt
        run: sbt test
