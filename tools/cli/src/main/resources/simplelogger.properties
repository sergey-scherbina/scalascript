# SLF4J SimpleLogger defaults for the ssc CLI.
# Third-party library logs (commonmark, snakeyaml, …) flow through here.
#
# To silence all third-party lib logs, pass --quiet on the command line,
# or set the level here:
#   org.slf4j.simpleLogger.defaultLogLevel=error
#
# Individual logger levels can be set with:
#   ssc -Dorg.slf4j.simpleLogger.log.org.eclipse.jetty=warn run foo.ssc

# Default: INFO so third-party lib output is visible.
org.slf4j.simpleLogger.defaultLogLevel=info

# Keep output minimal — no timestamps, thread names, or long class names.
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showShortLogName=false

# Log to stderr so ssc stdout (rendered output, emit-js, etc.) stays clean.
org.slf4j.simpleLogger.logFile=System.err
