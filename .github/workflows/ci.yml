name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules

  validate:
    name: Validate ScalaScript
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: temurin:21

      - name: Validate front-matter
        run: scala-cli --server=false ./v1/tools/scripts/validate-frontmatter.scala

      - name: Check example files exist
        run: |
          test -f examples/hello.ssc
          test -f examples/typed-data.ssc
          test -f examples/imports.ssc
          echo "All example files present"

  conformance:
    name: Conformance Suite
    runs-on: ubuntu-latest
    # 30m was too tight — the suite (conformance run + examples on 3 backends +
    # `ssc check` over every example) grew past it and was killed mid-run. 45m
    # gives headroom for runner variance without masking a real hang.
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: temurin:21

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier/sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      # Compiled classes + zinc analysis: without this every CI run recompiles
      # all ~259 modules from scratch (the 90-min budget is mostly compilation).
      # Keyed by commit SHA so a push reuses the nearest previous build via
      # restore-keys and zinc recompiles only what changed.
      #
      # RESTORE-ONLY here + save-only-on-success at the end of the job (see
      # "Save compiled classes"). The old unified actions/cache@v4 re-saved the
      # cache even when the build FAILED, so a single build that failed midway
      # through compiling crypto-spi cached a partial/stale `classes` dir; zinc
      # then marked crypto-spi up-to-date on every later run and skipped it,
      # leaving dependents unable to resolve scalascript.crypto.* — a poison
      # that self-perpetuated for 200+ red runs. Never caching a failed build
      # breaks that loop; the `-v2-` prefix discards the already-poisoned caches.
      - name: Restore compiled classes (zinc)
        uses: actions/cache/restore@v4
        with:
          path: |
            **/target/scala-*/classes
            **/target/scala-*/test-classes
            **/target/scala-*/zinc
            **/target/streams
          # Per-job prefix (…-v2-conf-, disjoint from the sbt job's …-v2-sbt-).
          # The two jobs compile with different sbt invocations (install.sh
          # cli/installBin vs `sbt compile cli/assembly`), so their zinc analyses
          # are NOT interchangeable — sharing a cache let one job restore the
          # other's stale crypto-spi classes (zinc marked them up-to-date and
          # skipped recompiling), re-creating the "not a member of scalascript.crypto"
          # poison. Keeping the prefixes disjoint stops the cross-contamination.
          key: ${{ runner.os }}-classes-v2-conf-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}
          # Include the build.sbt hash: zinc doesn't detect `dependsOn`/module-graph
          # changes, so restoring a classes cache built under a different build.sbt
          # serves stale upstream classes (the "value X is not a member of scalascript"
          # poison). Keying by build.sbt forces a clean cold rebuild whenever the
          # module graph changes, and reuses the cache only within a stable graph.
          restore-keys: |
            ${{ runner.os }}-classes-v2-conf-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-

      - name: Build ssc launcher (sbt-assembly)
        run: bash install.sh --dev

      - name: Run conformance tests
        # Warm JVM lane (specs/conformance-perf.md F3): reuse one Bloop build
        # server across cases instead of a cold scalac start per case. The
        # per-case cold compile is the dominant conformance cost; the INT/JS
        # lanes already batch (F4) but the JVM lane did not. Correctness is
        # unchanged (same `scala-cli run`, warm compiler). run.sc keeps the
        # server tree bounded and kills it on shutdown. Revert this env to fall
        # back to the serverless (cold, more robust) default.
        env:
          SSC_CONF_WARM_JVM: '1'
        run: scala-cli tests/conformance/run.sc

      - name: Run examples on all three backends
        run: scala-cli examples/run-all.sc

      - name: Type-check examples (ssc check)
        run: |
          ./bin/ssc check examples/*.ssc

      # Save the classes/zinc cache ONLY when every step above succeeded, so a
      # failed build can never poison later runs (the 200-run red streak cause).
      - name: Save compiled classes (zinc)
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            **/target/scala-*/classes
            **/target/scala-*/test-classes
            **/target/scala-*/zinc
            **/target/streams
          key: ${{ runner.os }}-classes-v2-conf-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}

  sbt:
    name: sbt — compile and test
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # node enables the interp==JS(node) leg of CrossBackendPropertyTest (the
      # cross-backend differential) under `sbt test`. Without it the test skips
      # via `assume(has("node"))`. The interp==JVM(scala-cli) leg stays gated and
      # is covered by the Conformance job; subprocess hangs are bounded by
      # ProcTestUtil.runCaptured, so a wedged child fails fast, not the whole job.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      # `ssc-tools emit-wasm` shells out to scala-cli, so the wasm TARGET lane of the
      # explicit-lanes gate below needs it on PATH (its dependency_tier is literally
      # `wasm-target-tools`). Without it that gate died with
      # `Cannot run program "scala-cli"` — invisible for as long as the gate failed
      # earlier, on the mcp provider lane. This does NOT weaken the compiler-free
      # story: the negative-toolchain gate builds its own sandbox PATH and asserts
      # scala-cli is unreachable there, so it is unaffected by the tool existing on
      # the runner.
      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: temurin:21

      - name: Cache Coursier/sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      # Same classes+zinc cache as the conformance job: without it this job
      # recompiles all ~259 modules from scratch every run. Restore-only +
      # save-on-success (see the end of this job) — a failed build must never
      # re-save the cache, or a stale crypto-spi `classes` dir poisons every
      # later run (zinc skips crypto-spi → dependents can't see
      # scalascript.crypto.*). The `-v2-` prefix discards the poisoned caches.
      - name: Restore compiled classes (zinc)
        uses: actions/cache/restore@v4
        with:
          path: |
            **/target/scala-*/classes
            **/target/scala-*/test-classes
            **/target/scala-*/zinc
            **/target/streams
          key: ${{ runner.os }}-classes-v2-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}
          # ONLY this job's own prefix — do NOT fall back to the conformance job's
          # …-v2-conf- cache: their zinc analyses are incompatible and sharing
          # re-poisons crypto-spi (see the conformance Restore step's note).
          # See the conformance job's note — key by build.sbt hash so a module-graph
          # change cold-rebuilds instead of restoring stale classes (poison).
          restore-keys: |
            ${{ runner.os }}-classes-v2-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-

      # installBin stages bin/lib/compiler/jars — the Scala compiler jars that
      # `compile-jvm --bytecode` / `link` load lazily via ssc.lib.path. The CLI
      # subprocess smoke tests (EmitScalaFacadeCliTest, link-tier tests) walk up
      # from the assembled jar to find them; without staging they fail with
      # "CompilerLoader: ssc.lib.path is not set".
      - name: Compile and assemble ssc.jar
        run: sbt compile cli/assembly installBin

      - name: ScalaScript 2.1 compiler-free ASM artifact release gate
        run: tests/e2e/v21-build-jvm-release-gate.sh --report target/v21-build-jvm-release.tsv

      - name: ScalaScript 2.1 explicit provider and target lanes
        run: tests/e2e/v21-explicit-lanes-gate.sh --report target/v21-explicit-lanes.tsv

      - name: ScalaScript 2.1 physically slim standard distribution gate
        run: tests/e2e/v21-slim-distribution-gate.sh --report target/v21-slim-distribution.tsv

      - name: ScalaScript 2.1 JRE-shaped no-javac module gate
        run: tests/e2e/v21-jre-module-gate.sh --report target/v21-jre-module.tsv

      - name: ScalaScript 2.1 standard-only negative toolchain release gate
        timeout-minutes: 30
        run: tests/e2e/v21-negative-toolchain-release-gate.sh --report target/v21-negative-toolchain-release.tsv

      - name: ScalaScript 2.1 direct-ASM local recursion gate
        run: tests/e2e/v21-direct-asm-recursion-smoke.sh

      - name: Test via sbt
        timeout-minutes: 60
        run: sbt test

      # Save the classes/zinc cache ONLY when compile + assembly + tests all
      # passed, so a failed build can never poison later runs.
      - name: Save compiled classes (zinc)
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            **/target/scala-*/classes
            **/target/scala-*/test-classes
            **/target/scala-*/zinc
            **/target/streams
          key: ${{ runner.os }}-classes-v2-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}
