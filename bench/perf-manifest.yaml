version: 1
status: informational-by-default

policy:
  defaultExitPolicy: informational
  blockingOnlyWhenExplicit:
    - ssc bench --require-target --target-ms N
    - ssc watch-bench --require-target --target-ms N
    - scripts/perf-smoke.sh --require-target --target-ms N
  baselinePolicy:
    trackedSummaryFiles:
      - bench/BASELINE.md
      - bench/BUNDLE_SIZES.md
    generatedRawFiles:
      - bench/BASELINE_RUNTIME.md
      - bench/jmh-results.json
      - bench/jmh-smoke.json
    rule: Raw benchmark outputs are ignored; promote stable summaries into tracked markdown baselines.

smoke:
  cli:
    command: ssc bench --smoke --warmup 0 --reps 1
    workload: bench/corpus/hello-world.ssc
    defaultBackends: [interpreter]
    purpose: Verify that the benchmark command still runs quickly in a developer checkout.
  jmh:
    command: sbt "interpreterBench/Jmh/run -wi 1 -i 1 -f 1 -rff bench/jmh-smoke.json -rf json .*InterpreterBench.arithLoop.*"
    purpose: Compile and execute one representative interpreter JMH benchmark.
    optIn: true

fullRuns:
  runtimeWallClock:
    command: scripts/runtime-bench.sh --baseline
    outputs: [bench/BASELINE_RUNTIME.md]
  jmhInterpreter:
    command: sbt "interpreterBench/Jmh/run -rff bench/jmh-results.json -rf json"
    outputs: [bench/jmh-results.json]
  jmhCompiler:
    command: sbt "compilerBench/Jmh/run -rff bench/jmh-compiler-results.json -rf json"
    outputs: [bench/jmh-compiler-results.json]

notes:
  - Do not fail default CI on noisy wall-clock numbers.
  - Use explicit target gates only for local reproduction or dedicated performance runners.
  - Keep generated JMH profiler directories ignored.
