name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules

  validate:
    name: Validate ScalaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Validate front-matter
        run: ./scripts/validate-frontmatter.scala

      - name: Check example files exist
        run: |
          test -f examples/hello.ssc
          test -f examples/typed-data.ssc
          test -f examples/imports.ssc
          echo "All example files present"

  conformance:
    name: Conformance Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Run conformance tests
        run: scala-cli conformance/run.sc

  scala3:
    name: Scala 3 Compiler Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Compile and run hello.ssc via Scala 3
        run: |
          out=$(scala-cli run compiler -- compile examples/hello.ssc 2>/dev/null)
          [ "$out" = "Hello, World!" ] && echo "OK: $out" || (echo "FAIL: got '$out'"; exit 1)

      - name: Compile and run script.ssc via Scala 3
        run: scala-cli run compiler -- compile examples/script.ssc 2>/dev/null

  sbt:
    name: sbt — compile and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Compile and test via sbt
        run: sbt compiler/compile compiler/test
