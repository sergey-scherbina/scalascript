name: Pages

# Single publisher for the GitHub Pages site. Two sources are composed into one
# artifact — a second deploying workflow would race this one for the same Pages
# deployment, so everything served from Pages must be built here.
#
# Layout (see "Compose Pages tree" below):
#   /                    landing page          <- site/index.html
#   /packages.yaml       registry CLI contract <- registry/site/  (MUST stay at the root:
#   /packages/**                                  RegistryClient.DefaultRegistryUrl is a
#   /search-index.json                            built-in default in shipped source)
#   /registry/           browseable registry   <- registry/site/index.html
#   /docs/               documentation site    <- generated by ssc from docs/**.md
#                                                  (v1/tools/docs-site/generate.ssc)

on:
  push:
    branches: [main]
    paths:
      - site/**
      - docs/**
      - registry/packages.yaml
      - registry/site/**
      - v1/tools/registry-site/generate.sc
      - v1/tools/docs-site/generate.ssc
      - .github/workflows/pages.yml
  pull_request:
    branches: [main]
    paths:
      - site/**
      - docs/**
      - registry/packages.yaml
      - registry/site/**
      - v1/tools/registry-site/generate.sc
      - v1/tools/docs-site/generate.ssc
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    # Building ssc (sbt cli/installBin) to run the .ssc docs generator dominates
    # this job; a cold build is ~20-30 min, cache-warm far less.
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: temurin:21

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier/sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            ~/.sbt
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      # Restore-only + save-only-on-success (see "Save compiled classes"), with a
      # prefix DISJOINT from ci.yml's sbt/conf jobs: those compile with different
      # sbt invocations, so sharing a zinc analysis serves stale classes (the
      # "not a member of scalascript.*" poison documented in ci.yml). Keeping
      # `-v2-pages-` separate stops cross-contamination.
      - name: Restore compiled classes (zinc)
        uses: actions/cache/restore@v4
        with:
          path: |
            **/target/scala-*/classes
            **/target/scala-*/test-classes
            **/target/scala-*/zinc
            **/target/streams
          key: ${{ runner.os }}-classes-v2-pages-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-classes-v2-pages-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-

      - name: Generate registry site
        run: scala-cli --server=false v1/tools/registry-site/generate.sc -- registry/packages.yaml registry/site

      - name: Check generated registry artifact
        run: |
          test -f registry/site/packages.yaml
          test -f registry/site/index.html
          test -f registry/site/search-index.json
          test ! -f registry/site/CNAME
          grep -q "io.scalascript/json" registry/site/packages.yaml

      # Dogfood: the docs site is generated by the ScalaScript compiler itself,
      # from docs/**.md via std/markdown-html. Requires the staged launcher
      # (install.sh --dev == sbt cli/installBin) so `bin/ssc run` finds its
      # native frontend under bin/lib.
      - name: Build ssc launcher (sbt-assembly + installBin)
        run: bash install.sh --dev

      - name: Generate docs site
        run: bin/ssc run v1/tools/docs-site/generate.ssc -- docs site/docs

      # Compare, don't pre-judge (AGENTS.md): assert the generator actually
      # produced pages AND that real Markdown content reached the HTML, printing
      # expected/got on mismatch rather than failing silently.
      - name: Check generated docs
        run: |
          set -eu
          test -f site/docs/index.html
          test -f site/docs/search-index.json
          pages=$(find site/docs -name '*.html' | wc -l)
          if [ "$pages" -lt 10 ]; then
            echo "docs check FAILED: expected>=10 html pages  got=$pages"; exit 1
          fi
          # A known heading from a known source doc must survive into its page.
          if ! grep -q "Getting Started" site/docs/getting-started-standalone.html; then
            echo "docs check FAILED: expected='Getting Started' in getting-started-standalone.html  got=<absent>"
            exit 1
          fi
          echo "docs check OK: $pages pages"

      - name: Compose Pages tree
        run: |
          set -eu
          rm -rf _site
          mkdir -p _site
          # 1. Registry at the root — keeps /packages.yaml and /packages/** resolving
          #    for every `ssc search|info|add` already in the wild.
          cp -R registry/site/. _site/
          # 2. Registry HTML index also under /registry/ (its links are relative, so it
          #    keeps working there once the landing page takes over the root index).
          mkdir -p _site/registry
          cp -R registry/site/. _site/registry/
          # 3. Landing page wins the root index.html.
          cp -R site/. _site/
          # Deploy notes are for maintainers, not for publishing.
          rm -f _site/DEPLOY.md
          # 4. Generated docs live under /docs/ (site/docs was produced above and
          #    copied in with site/. — this is just a belt-and-suspenders guard
          #    that the directory made it, since it is not committed).
          test -d _site/docs

      - name: Check composed tree
        run: |
          set -eu
          # Landing page owns the root
          test -f _site/index.html
          test -f _site/favicon.svg
          grep -q "Markdown you can compile" _site/index.html
          test ! -f _site/DEPLOY.md
          # Hand-authored companion pages published beside the landing
          test -f _site/install.html
          grep -q "Install" _site/install.html
          test -f _site/scljet.html
          # Registry CLI contract preserved at the root
          test -f _site/packages.yaml
          test -f _site/search-index.json
          test -f _site/packages/io.scalascript/json/index.json
          grep -q "io.scalascript/json" _site/packages.yaml
          # Browseable registry index still reachable
          test -f _site/registry/index.html
          grep -q "ScalaScript Package Registry" _site/registry/index.html
          test -f _site/registry/packages/io.scalascript/json/index.json
          # Generated docs published under /docs/
          test -f _site/docs/index.html
          test -f _site/docs/search-index.json
          test -f _site/docs/getting-started-standalone.html
          grep -q "Getting Started" _site/docs/getting-started-standalone.html

      # Save the class cache ONLY on success, so a build that failed midway can
      # never cache partial/stale classes (the poison pattern from ci.yml).
      - name: Save compiled classes (zinc)
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            **/target/scala-*/classes
            **/target/scala-*/test-classes
            **/target/scala-*/zinc
            **/target/streams
          key: ${{ runner.os }}-classes-v2-pages-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}-${{ github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy site
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
