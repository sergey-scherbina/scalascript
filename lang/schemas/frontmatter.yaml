# JSON Schema for ScalaScript Front-Matter (YAML format)
# Validates the module manifest at the start of .ssc files
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://scalascript.dev/schemas/frontmatter.yaml"
title: ScalaScript Module Manifest
description: YAML front-matter schema for .ssc files
type: object

properties:
  name:
    type: string
    description: Module name (used for imports)
    pattern: "^[a-z][a-z0-9-]*$"
    examples:
      - "my-module"
      - "collections"

  version:
    type: string
    description: Semantic version of the module
    pattern: "^\\d+\\.\\d+\\.\\d+(-[a-zA-Z0-9.]+)?(\\+[a-zA-Z0-9.]+)?$"
    examples:
      - "1.0.0"
      - "0.1.0-alpha"
      - "2.0.0+build.123"

  description:
    type: string
    description: Short description of the module

  author:
    oneOf:
      - type: string
      - type: object
        properties:
          name:
            type: string
          email:
            type: string
            format: email
          url:
            type: string
            format: uri
        required:
          - name

  license:
    type: string
    description: SPDX license identifier
    examples:
      - "Apache-2.0"
      - "MIT"
      - "GPL-3.0-only"

  repository:
    type: string
    format: uri
    description: URL to source repository

  dependencies:
    type: object
    description: Module dependencies with version constraints
    additionalProperties:
      type: string
      description: Version constraint (semver range)
    examples:
      - std/collections: "^1.0.0"
      - my-lib: ">=2.0.0 <3.0.0"

  devDependencies:
    type: object
    description: Development-only dependencies
    additionalProperties:
      type: string

  exports:
    type: array
    description: Explicitly exported names (if omitted, all top-level names are public)
    items:
      type: string
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
    uniqueItems: true
    examples:
      - - "MyClass"
        - "myFunction"
        - "MyType"

  private:
    type: array
    description: Names to keep private even if at top scope
    items:
      type: string
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
    uniqueItems: true

  targets:
    type: array
    description: |
      Build targets.  `ssc` = interpreter fat-JAR (default, no compiler needed);
      `jvm` = fully compiled via JvmGen → scalac bytecode; `js` = JS bundle;
      `web` = static HTML; `wasm` / `native` = future.
    items:
      type: string
      enum:
        - ssc
        - jvm
        - js
        - web
        - wasm
        - native
    uniqueItems: true
    default:
      - ssc

  transport:
    type: string
    description: |
      Full-stack backend transport override. `http` preserves split-process
      REST behavior; `in-process` is recognized but runtime dispatch is planned
      and not implemented yet.
    enum: [http, in-process]

  fullstack:
    type: object
    description: Full-stack run configuration.
    additionalProperties: false
    properties:
      transport:
        type: string
        description: |
          Backend transport for full-stack runs. `http` is the currently
          implemented behavior; `in-process` is planned and currently
          diagnostic-only.
        enum: [http, in-process]

  scala:
    type: object
    description: Scala/JVM-specific configuration
    properties:
      version:
        type: string
        description: Minimum Scala version required
        pattern: "^3\\.\\d+\\.\\d+$"
        default: "3.3.0"
      jvmTarget:
        type: string
        enum: ["11", "17", "21"]
        default: "17"
      options:
        type: array
        items:
          type: string
        description: Additional compiler options

  js:
    type: object
    description: JavaScript-specific configuration
    properties:
      moduleType:
        type: string
        enum:
          - esm
          - commonjs
          - umd
        default: esm
      target:
        type: string
        enum:
          - es5
          - es2015
          - es2020
          - esnext
        default: es2020

  scripts:
    type: object
    description: |
      Project scripts, run with `ssc <name>` from the project directory.
      Each key is a short alias; the value is an ssc subcommand string
      (e.g. "watch", "build --target web"). The .ssc file is appended
      automatically, so you don't need to repeat it.
    additionalProperties:
      type: string
    examples:
      - dev: watch
        build: build --target web
        test: test
        check: check

  main:
    type: string
    description: Entry point function for executable modules
    pattern: "^[A-Za-z_][A-Za-z0-9_.]*$"
    examples:
      - "main"
      - "App.run"

  routes:
    type: array
    description: |
      HTTP route declarations.  Each entry registers
      `route(method, path) { req => handler(req) }` automatically;
      the handler must be a top-level function defined in the module
      that takes a `Request` and returns a `Response`.
    items:
      type: object
      required: [method, path, handler]
      additionalProperties: false
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
        path:
          type: string
          description: URL path pattern with `:name` captures (e.g. `/users/:id`)
        handler:
          type: string
          description: Name of a top-level handler function in the module
          pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
    examples:
      - - method: GET
          path: /api/todos
          handler: listTodos
        - method: POST
          path: /api/todos
          handler: addTodo

  databases:
    type: object
    description: |
      Named JDBC connections consumed by `sql` fenced code blocks
      (SPEC § 3.3.1, v1.26).  Map keys are connection names referenced
      by `@db=name` on the fence line; the conventional default is
      `default`.  String values may contain `${env:VAR}` references —
      resolved at runtime when the connection is opened, not at parse
      time, so a `.ssc` file declaring secret-referencing entries
      still parses on a machine that doesn't have the secrets set.
    additionalProperties:
      type: object
      required: [url]
      additionalProperties: false
      properties:
        url:
          type: string
          description: JDBC URL (`jdbc:h2:mem:...`, `jdbc:postgresql://...`, etc.)
        user:
          type: string
        password:
          type: string
        driver:
          type: string
          description: |
            Fully-qualified JDBC driver class.  Usually omitted — the
            JDBC `ServiceLoader` picks bundled drivers (H2, SQLite)
            and any `dep:`-imported driver up automatically.
    examples:
      - default:
          url: jdbc:h2:mem:dev;DB_CLOSE_DELAY=-1
        reports:
          url: jdbc:postgresql://reports.internal:5432/warehouse
          user: ${env:RPT_USER}
          password: ${env:RPT_PASSWORD}

  schemas:
    type: object
    description: |
      Optional type-to-storage metadata consumed by typed data mapping. Keys are
      ScalaScript type names; fields declare canonical storage names, read
      aliases, missing-field defaults, key markers, and strict unknown-field
      rejection. The interpreter typed SQL path consumes this metadata for
      `Db.query/insert/update[A]`; JVM typeclass code can express the same
      metadata with annotations or explicit field specs.
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        rejectUnknown:
          type: boolean
          description: Reject decoded columns/fields not declared by the target type.
        reject-unknown:
          type: boolean
          description: Kebab-case alias for `rejectUnknown`.
        fields:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                description: Shorthand canonical storage name for the field.
              - type: object
                additionalProperties: false
                properties:
                  name:
                    type: string
                    description: Canonical storage name written by encoders.
                  column:
                    type: string
                    description: SQL-oriented alias for `name`.
                  field:
                    type: string
                    description: Generic storage-field alias for `name`.
                  aliases:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: string
                    description: Alternative input names accepted while decoding.
                  default:
                    description: Default scalar value used when the field is missing.
                    type:
                      - "null"
                      - boolean
                      - integer
                      - number
                      - string
                  key:
                    type: boolean
                    description: Marks the identity/key field for write helpers and sync stores.
    examples:
      - Person:
          rejectUnknown: true
          fields:
            id:
              key: true
            displayName:
              name: display_name
              aliases: [name]
            active:
              default: true

  keywords:
    type: array
    items:
      type: string
    description: Keywords for discoverability

required: []

additionalProperties: false

examples:
  - name: hello
    version: 1.0.0
    description: A simple hello world module
    exports:
      - greet
      - farewell

  - name: my-library
    version: 0.5.0
    author:
      name: Jane Doe
      email: jane@example.com
    license: Apache-2.0
    dependencies:
      std/collections: "^1.0.0"
    targets:
      - jvm
      - js
