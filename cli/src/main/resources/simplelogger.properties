# SLF4J SimpleLogger defaults for the ssc CLI.
# All properties can be overridden at launch via system properties, e.g.:
#   ssc -Dorg.slf4j.simpleLogger.defaultLogLevel=debug run foo.ssc
# or by placing a simplelogger.properties earlier on the classpath.

# Suppress chatty library output; only warnings and errors reach the console.
org.slf4j.simpleLogger.defaultLogLevel=warn

# Keep output minimal — no timestamps, thread names, or long class names.
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showShortLogName=false

# Log to stderr so ssc stdout (rendered output, emit-js, etc.) stays clean.
org.slf4j.simpleLogger.logFile=System.err
