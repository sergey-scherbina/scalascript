# ScalaScript Package Registry
#
# One entry per package.  Required fields: name, version.
# Submit a PR adding your package to this list.
# CI runs: schema validation + `ssc check` on each entry.
#
# See specs/arch-registry.md for the full schema specification.

- name: io.scalascript/json
  version: 1.0.0
  description: "Built-in JSON encoding/decoding for ScalaScript"
  keywords: [json, serialization, codec, parsing]
  backends: [jvm, js]
  url: "github:scalascript/scalascript@v1.0.0"
  license: Apache-2.0
  author: "ScalaScript Team"
  homepage: "https://scalascript.io/packages/json"
  scala-script-version: ">=1.0"

