name: Registry Pages

on:
  push:
    branches: [main]
    paths:
      - registry/packages.yaml
      - registry/site/**
      - tools/registry-site/generate.sc
      - .github/workflows/registry-pages.yml
  pull_request:
    branches: [main]
    paths:
      - registry/packages.yaml
      - registry/site/**
      - tools/registry-site/generate.sc
      - .github/workflows/registry-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: registry-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build registry site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Scala CLI
        uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: temurin:21

      - name: Generate registry site
        run: scala-cli --server=false tools/registry-site/generate.sc -- registry/packages.yaml registry/site

      - name: Check generated registry artifact
        run: |
          test -f registry/site/packages.yaml
          test -f registry/site/index.html
          test -f registry/site/search-index.json
          test ! -f registry/site/CNAME
          grep -q "io.scalascript/json" registry/site/packages.yaml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: registry/site

  deploy:
    name: Deploy registry site
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
